<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment Successful | Vinay.QA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0a0e0f;
  --text:#e8edf0;
  --muted:#6b7f86;
  --accent:#00e5a0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:var(--bg);
  color:var(--text);

  font-family:'JetBrains Mono', monospace;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;

  background-image:
  linear-gradient(rgba(0,229,160,.04) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,229,160,.04) 1px, transparent 1px);

  background-size:60px 60px;

  pointer-events:none;
}

.glow{
  position:absolute;

  width:500px;
  height:500px;

  border-radius:50%;

  background:
  radial-gradient(
    circle,
    rgba(0,229,160,.12),
    transparent 70%
  );

  filter:blur(10px);

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);
}

.success-card{

  position:relative;
  z-index:2;

  width:90%;
  max-width:700px;

  padding:60px 50px;

  text-align:center;

  background:
  rgba(255,255,255,.06);

  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);

  border:1px solid rgba(255,255,255,.12);

  border-radius:28px;

  box-shadow:
  0 25px 80px rgba(0,0,0,.45),
  inset 0 1px 1px rgba(255,255,255,.08);
}

.success-badge{

  display:inline-flex;

  padding:10px 18px;

  border-radius:999px;

  background:
  rgba(0,229,160,.12);

  border:
  1px solid rgba(0,229,160,.25);

  color:var(--accent);

  font-size:12px;
  letter-spacing:1px;
  text-transform:uppercase;

  margin-bottom:25px;
}

h1{
  font-family:'Syne', sans-serif;

  font-size:clamp(2.5rem,5vw,4rem);

  line-height:1.1;

  margin-bottom:20px;
}

p{
  color:var(--muted);

  line-height:1.9;

  max-width:520px;

  margin:0 auto 35px;
}

.download-btn{

  display:inline-flex;
  align-items:center;
  justify-content:center;

  padding:16px 32px;

  background:var(--accent);

  color:#000;

  text-decoration:none;

  border-radius:10px;

  font-weight:600;

  transition:.25s ease;
}

.download-btn:hover{

  transform:translateY(-3px);

  box-shadow:
  0 10px 30px rgba(0,229,160,.30);
}

.note{

  margin-top:25px;

  font-size:12px;

  color:var(--muted);
}

.close-btn{
  margin-top:10px;
  padding:14px 28px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.08);
  color:var(--text);
  cursor:pointer;
  transition:.25s ease;
}

.close-btn:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,.12);
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="success-card">

<div class="success-badge">
Payment Confirmed
</div>

<h1>
Thank You 🎉
</h1>

<p>
Your purchase has been completed successfully.
Click the button below to download your Core Java Notes and continue your QA learning journey.
</p>

<button id="download-notes" class="btn-primary">
  Download Notes
</button>

<div style="margin-top:16px;">
  <button
    onclick="window.close()"
    class="close-btn">
    Close Window
  </button>
</div>

<div class="note">
VINAY.QA • Premium Learning Resources
</div>

</div>
<script>
document
.getElementById("download-notes")
.addEventListener("click", () => {

  const paid =
    sessionStorage.getItem("payment_verified");

  if (paid !== "true") {

    alert(
      "Payment verification required."
    );

    window.location.href =
      "starter-pack.html";

    return;
  }

  window.location.href =
    "notes/core-java.pdf";

});
</script>

</body>
</html>
